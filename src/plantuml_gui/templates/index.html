<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PlantUML Interactive Editor</title>
    <link rel="icon" type="image/x-icon" href="static/favicon-32x32.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS (legacy: modals and context menus only) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js" integrity="sha512-immo//J6lKoR+nRIFDPxoxfL2nd/0N3w8l4LwH4HSSVovtUjab5kbh4AhixLH5z9mIv37llY9Q2i8AfEDXyYjw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.9.6/ace.js" integrity="sha512-czfWedq9cnMibaqVP2Sw5Aw1PTTabHxMuTOkYkL15cbCYiatPIbxdV0zwhfBZKNODg0zFqmbz8f7rKmd6tfR/Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src='https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js'></script>
    <script src="static/script.js?v={{ script_hash }}"></script>
    <script src="static/sequence.js?v={{ script_hash }}"></script>
    <script src="static/activity.js?v={{ script_hash }}"></script>
    <link rel="stylesheet" href="static/styles.css">
</head>

<body>
  <div id="popup">Error message</div>

  <div class="app-shell">
    <!-- Global Bar -->
    <div class="global-bar">
      <span class="app-name">PlantUML Interactive Editor</span>
      <span class="toolbar-sep"></span>
      <div class="btn-group" role="group">
        <button type="button" class="toolbar-btn dropdown-toggle" data-toggle="dropdown" aria-expanded="false">
          New
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" id="clear" href="#">Empty</a></li>
          <li><a class="dropdown-item" id="demo" href="#">Activity Demo</a></li>
          <li><a class="dropdown-item" id="sequence" href="#">Sequence Demo</a></li>
        </ul>
      </div>
      <span class="toolbar-sep"></span>
      <button type="button" id="addTitleButton" class="toolbar-btn" title="Insert title block">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
        Add title
      </button>
      <span class="toolbar-sep"></span>
      <button type="button" id="undo" class="toolbar-btn" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h7a4 4 0 0 1 0 8H8"/><path d="M6 4L3 7l3 3"/></svg>
      </button>
      <button type="button" id="restore" class="toolbar-btn" title="Redo (Ctrl+Y)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7H6a4 4 0 0 0 0 8h2"/><path d="M10 4l3 3-3 3"/></svg>
      </button>
      <span class="toolbar-sep"></span>
      <span class="toolbar-spacer"></span>
      <span class="version-badge" id="version" onclick="showChangelog()" title="Version History">v{{version}}</span>
      <button type="button" class="toolbar-btn" data-toggle="modal" data-target="#usageModal" title="Help">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M6 6.5a2 2 0 0 1 3.9.5c0 1-1.4 1.5-1.9 2" stroke-linecap="round"/><circle cx="8" cy="12" r="0.5" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>

    <!-- Split Container -->
    <div class="split-container">
      <!-- Left Pane: Code -->
      <div class="left-pane">
        <div class="code-toolbar">
          <button type="button" id="copybutton" class="toolbar-btn" title="Copy PlantUML source">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M3 11V3a1 1 0 0 1 1-1h6"/></svg>
          </button>
          <button type="button" id="pastebutton" class="toolbar-btn" title="Paste PlantUML source">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="10" height="11" rx="1"/><path d="M6 2h4a1 1 0 0 1 1 1v1H5V3a1 1 0 0 1 1-1z"/></svg>
          </button>
          <span class="toolbar-sep"></span>
          <span class="toolbar-spacer"></span>
          <button type="button" id="save" class="toolbar-btn toolbar-btn--accent" title="Download .puml">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2v9M5 8l3 3 3-3"/><path d="M3 12v2h10v-2"/></svg>
          </button>
        </div>
        <div id="editor"></div>
        <button type="button" id="load" hidden></button>
        <input type="file" id="file-input" style="display: none;">
      </div>

      <!-- Resizable Divider -->
      <div class="divider" id="pane-divider"></div>

      <!-- Right Pane: Diagram -->
      <div class="right-pane">
        <div class="diagram-toolbar">
          <button type="button" id="zoom-out" class="toolbar-btn" title="Zoom out">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5" stroke-linecap="round"/><path d="M5 7h4"/></svg>
          </button>
          <button type="button" id="zoom-in" class="toolbar-btn" title="Zoom in">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5" stroke-linecap="round"/><path d="M5 7h4M7 5v4"/></svg>
          </button>
          <button type="button" id="zoom-fit" class="toolbar-btn" title="Reset zoom">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3"/></svg>
          </button>
          <span class="toolbar-spacer"></span>
          <button type="button" id="png" class="toolbar-btn toolbar-btn--accent" title="Download diagram as PNG">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2v9M5 8l3 3 3-3"/><path d="M3 12v2h10v-2"/></svg>
            PNG
          </button>
        </div>
        <div id="colb-container">
          <div id="colb">
            <div id="init-text">
              <h1>PlantUML is Loading</h1>
              <img src="static/Circles-menu-3.gif" alt="Loading">
            </div>
          </div>
          <div id="loading-overlay"></div>
        </div>
      </div>
    </div>
  </div>

{% include "partials/activity_menus.html" %}

{% include "partials/sequence_menus.html" %}

<div class="modal fade" id="changelog-modal" tabindex="-1" role="dialog" aria-labelledby="changelogModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="changelogModalTitle">Version History</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="changelog-body">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
    (async function() {
      await initeditor();
      initialize();
    })();
    var element = document.getElementById('colb');

    const panzoomInstance = panzoom(element, {
      maxZoom: 3,
      minZoom: 0.25,
      bounds: true,
    });

    element.addEventListener('dblclick', (event) => {
      event.stopImmediatePropagation();
    });

    // Zoom controls
    document.getElementById('zoom-in').addEventListener('click', () => {
      const t = panzoomInstance.getTransform();
      const newScale = Math.min(t.scale * 1.1, 3);
      panzoomInstance.zoomAbs(t.x, t.y, newScale);
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      const t = panzoomInstance.getTransform();
      const newScale = Math.max(t.scale / 1.1, 0.25);
      panzoomInstance.zoomAbs(t.x, t.y, newScale);
    });
    document.getElementById('zoom-fit').addEventListener('click', () => {
      panzoomInstance.moveTo(0, 0);
      panzoomInstance.zoomAbs(0, 0, 1);
    });

    // Resizable divider
    (function() {
      const divider = document.getElementById('pane-divider');
      const left = document.querySelector('.left-pane');
      const right = document.querySelector('.right-pane');
      const container = document.querySelector('.split-container');
      let dragging = false;

      divider.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragging = true;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const min = 200;
        const max = rect.width - 200 - 4;
        const clamped = Math.min(Math.max(x, min), max);
        left.style.flex = 'none';
        left.style.width = clamped + 'px';
        right.style.flex = '1';
        editor.resize();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
      });
    })();
</script>

</body>
</html>
